<h1>Mango Shake</h1>
<p>Here's a recipe for yummy mango shake.</p>
<h2>Ingredients</h2>
<ul>
	<li> frozen mango</li>
	<li>ice </li>
	<li>milk</li>
</ul>

<h2>Directions</h2>
<ol>
	<li>take a cup of frozen mango.</li>
	<li>add milk and ice.</li>
	<li>blend together until all is smooth.</li>
	<li> put in a cup and enjoy </li>
	
</ol>
